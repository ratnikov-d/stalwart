services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart

    hostname: ${FQDN:-not-configured.invalid}

    environment:
      TZ: ${TZ:-Europe/Moscow}
      # STALWART_RECOVERY_ADMIN: ${RECOVERY_ADMIN:-admin:ChangeMeNow123!}

    restart: unless-stopped

    networks:
      - shared-net

    ports:
      - "25:25/tcp"
      - "143:143/tcp"
      - "465:465/tcp"
      - "587:587/tcp"
      - "993:993/tcp"

    volumes:
      - stalwart-data:/var/lib/stalwart
      - certs:/certs:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    labels:
      - traefik.enable=true

      - traefik.http.routers.stalwart.rule=Host(`${FQDN:-not-configured.invalid}`)
      - traefik.http.routers.stalwart.entrypoints=websecure
      - traefik.http.routers.stalwart.tls.certresolver=letsencrypt

      # Проверить после запуска фактический порт Web UI
      - traefik.http.services.stalwart.loadbalancer.server.port=8080

volumes:
  stalwart-data:
    name: stalwart-data
 
  certs:
    external: true

networks:
  shared-net:
    external: true