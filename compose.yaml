services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart
    hostname: ${FQDN:-not-configured.invalid}

    restart: unless-stopped

    environment:
      TZ: ${TZ:-Europe/Moscow}
      STALWART_RECOVERY_ADMIN: ${RECOVERY_ADMIN:-admin:ChangeMeNow123!}

    networks:
      - shared-net

    ports:
      - "25:25"
      - "143:143"
      - "465:465"
      - "587:587"
      - "993:993"

    expose:
      - "443"
      - "8080"

    volumes:
      - stalwart-data:/var/lib/stalwart
      - stalwart-config:/etc/stalwart

    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-net

      #################################################################
      # Web Admin
      #################################################################

      # - traefik.http.routers.stalwart.rule=Host(`${ADMINFQDN}`)
      # - traefik.http.routers.stalwart.entrypoints=websecure
      # - traefik.http.routers.stalwart.tls=true
      # - traefik.http.routers.stalwart.tls.certresolver=letsencrypt

      # - traefik.http.services.stalwart.loadbalancer.server.port=8080

      #################################################################
      # Mail TLS Passthrough
      #################################################################
      # Изменяем http на tcp для роутера и привязываем к websecure
      - "traefik.tcp.routers.mail.entrypoints=websecure"
      - "traefik.tcp.routers.mail.rule=HostSNI(`mail.ratnikov.su`)" # Если используется TLS passthrough
      # ИЛИ если это чистый TCP без TLS (для сторонних портов, отличных от 443):
      # - "traefik.tcp.routers.mail.rule=HostSNI(`*`)"

      # Направляем на TCP-сервис и подключаем наш транспорт
      - "traefik.tcp.routers.mail.service=mail-backend"
      - "traefik.tcp.services.mail-backend.loadbalancer.serverstransport=mail-transport@file"
      
      # Не забываем указать порт, куда слать трафик внутри контейнера mail
      - "traefik.tcp.services.mail-backend.loadbalancer.servers[0].port=443"

volumes:
  stalwart-data:
    name: stalwart-data

  stalwart-config:
    name: stalwart-config

networks:
  shared-net:
    external: true