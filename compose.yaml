services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    container_name: stalwart

    hostname: ${FQDN:-not-configured.invalid}

    environment:
      TZ: ${TZ:-Europe/Moscow}
      STALWART_RECOVERY_ADMIN: ${RECOVERY_ADMIN:-admin:ChangeMeNow123!}

    restart: unless-stopped

    networks:
      - shared-net

    ports:
      - "25:25/tcp"
      - "143:143/tcp"
      - "465:465/tcp"
      - "587:587/tcp"
      - "993:993/tcp"
    
    expose:
      - "8080"
      - "443"

    volumes:
      - stalwart-data:/var/lib/stalwart
      - stalwart-config:/etc/stalwart

    labels:
      - traefik.enable=true
      - traefik.docker.network=shared-net
      
      # HTTP роутер для админки
      - traefik.http.routers.stalwart.rule=Host(`${ADMINFQDN:-not-configured.invalid}`)
      - traefik.http.routers.stalwart.entrypoints=websecure
      - traefik.http.routers.stalwart.tls=true
      - traefik.http.routers.stalwart.tls.certresolver=letsencrypt
      - traefik.http.services.stalwart.loadbalancer.server.port=8080

      # TCP роутер для почты с ProxyProtocol через ServersTransport
      - traefik.tcp.routers.mail.rule=HostSNI(`${FQDN:-not-configured.invalid}`)
      - traefik.tcp.routers.mail.entrypoints=websecure
      - traefik.tcp.routers.mail.tls.passthrough=true
      
      # Применяем ServersTransport к роутеру
      - traefik.tcp.routers.mail.serversTransport=mail-transport
      
      # Создаем ServersTransport с ProxyProtocol
      - traefik.tcp.serversTransports.mail-transport.proxyProtocol.version=2
      
      # Сервис
      - traefik.tcp.services.mail.loadbalancer.server.port=443

volumes:
  stalwart-data:
    name: stalwart-data

  stalwart-config:
    name: stalwart-config

  certs:
    external: true

networks:
  shared-net:
    external: true